<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colored Horizontal Chart</title>

<style>

body{
  font-family: Arial, sans-serif;
  padding:40px;
}

table{
  border-collapse: collapse;
  width:500px;
}

td{
  padding:10px;
}

.label{
  width:120px;
  font-weight:bold;
}

/* bar background */
.bar-bg{
  width:100%;
  height:26px;
  background:#eee;
  border-radius:6px;
  overflow:hidden;
}

/* bar */
.bar{
  height:100%;
  width:0;
  color:white;
  text-align:right;
  padding-right:6px;
  line-height:26px;
  font-size:12px;
  animation:grow 1s forwards;
}

/* stagger animation */
tr:nth-child(1) .bar{ animation-delay:0.2s;}
tr:nth-child(2) .bar{ animation-delay:0.4s;}
tr:nth-child(3) .bar{ animation-delay:0.6s;}
tr:nth-child(4) .bar{ animation-delay:0.8s;}
tr:nth-child(5) .bar{ animation-delay:1s;}

/* animation */
@keyframes grow{
  from{width:0;}
  to{width:var(--value);}
}

/* different colors */
.bar1{background:#e74c3c;}
.bar2{background:#3498db;}
.bar3{background:#2ecc71;}
.bar4{background:#f39c12;}
.bar5{background:#9b59b6;}

</style>
</head>

<body>

<h2>Horizontal Chart with Different Colors</h2>

<table>

<tr>
<td class="label">Sales</td>
<td>
<div class="bar-bg">
<div class="bar bar1" style="--value:75%">75%</div>
</div>
</td>
</tr>

<tr>
<td class="label">Marketing</td>
<td>
<div class="bar-bg">
<div class="bar bar2" style="--value:55%">55%</div>
</div>
</td>
</tr>

<tr>
<td class="label">Development</td>
<td>
<div class="bar-bg">
<div class="bar bar3" style="--value:90%">90%</div>
</div>
</td>
</tr>

<tr>
<td class="label">Support</td>
<td>
<div class="bar-bg">
<div class="bar bar4" style="--value:40%">40%</div>
</div>
</td>
</tr>

<tr>
<td class="label">HR</td>
<td>
<div class="bar-bg">
<div class="bar bar5" style="--value:65%">65%</div>
</div>
</td>
</tr>

</table>

</body>
</html>
